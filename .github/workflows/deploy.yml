  # ── Deploy to VPS ──────────────────────────────────────
  deploy:
    # needs: [build-auth, build-learn]
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Debug secrets & Test SSH connectivity
        run: |
          HOST="${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          echo "HOST=${{ secrets.VPS_HOST }}"
          echo "PORT=${{ secrets.VPS_PORT }}"
          echo "VPS_HOST length: ${#HOST}, first 4 chars: ${HOST:0:4}..."
          echo "VPS_PORT length: ${#PORT}, value: $PORT"
          echo "VPS_USER length: ${#VPS_USER}"
          echo "VPS_SSH_KEY length: ${#KEY}"
          echo "Runner IP: $(curl -s ifconfig.me)"
          echo "---"

          echo "Debug: Pinging $HOST"
          ping -c 4 -W 2 $HOST || echo "ping failed"
          echo "---"

          echo "Debug: traceroute to $HOST (requires traceroute, installing if needed)"
          sudo apt-get update -y && sudo apt-get install -y traceroute nmap
          traceroute $HOST || echo "traceroute failed"
          echo "---"

          echo "Debug: Testing HTTP/HTTPS connectivity (just in case)"
          curl -kv -m 5 https://$HOST || echo "HTTPS curl failed"
          echo "---"

          echo "Debug: Port scanning with nmap (if allowed)"
          nmap -p $PORT -Pn $HOST || echo "nmap failed"
          echo "---"

          echo "Debug: Netcat SSH Port Test"
          nc -zv -w 10 $HOST $PORT || true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          KEY: ${{ secrets.VPS_SSH_KEY }}
          PASSWORD: ${{ secrets.VPS_PASSWORD }}
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          password: ${{ secrets.VPS_PASSWORD }}
          debug: true
          timeout: 80s
          command_timeout: 30m
          script: |
            set -e

            DEPLOY_DIR="/home/deploy/english-learning-be"
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            # ── Download docker-compose.yml directly (no git clone needed) ──
            curl -sSL "https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml" -o docker-compose.yml

            # ── Login to GHCR ──
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ secrets.VPS_USER }} --password-stdin

            # ── Create root .env (docker-compose variables) ──
            cat > .env << ENVEOF
            AUTH_IMAGE=${{ env.IMAGE_PREFIX }}/auth:latest
            LEARN_IMAGE=${{ env.IMAGE_PREFIX }}/learn:latest
            AUTH_PORT=${{ secrets.AUTH_PORT }}
            LEARN_PORT=${{ secrets.LEARN_PORT }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            ENVEOF

            # ── Create auth/.env ──
            mkdir -p auth
            cat > auth/.env << ENVEOF
            DATABASE_URL=${{ secrets.AUTH_DATABASE_URL }}
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            JWT_ACCESS_EXPIRATION=${{ secrets.JWT_ACCESS_EXPIRATION }}
            JWT_REFRESH_EXPIRATION=${{ secrets.JWT_REFRESH_EXPIRATION }}
            REDIS_URL=redis://:${{ secrets.REDIS_PASSWORD }}@redis:6379
            CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
            PORT=${{ secrets.AUTH_PORT }}
            ENVEOF

            # ── Create learn/.env ──
            mkdir -p learn
            cat > learn/.env << ENVEOF
            DATABASE_URL=${{ secrets.LEARN_DATABASE_URL }}
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
            PORT=${{ secrets.LEARN_PORT }}
            ENVEOF

            # ── Pull images & deploy ──
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

            echo "✅ Deployment complete!"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
