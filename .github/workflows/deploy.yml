name: Deploy Microservices

on:
  push:
    branches: [main]
    paths:
      - 'auth/**'
      - 'learn/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

