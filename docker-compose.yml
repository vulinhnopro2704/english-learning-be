services:
  # ── Auth Service ──────────────────────────────────
  auth:
    image: ${AUTH_IMAGE:-ghcr.io/vulinhnopro2704/english-learning-be/auth:latest}
    container_name: auth-service
    ports:
      - '${AUTH_PORT:-3001}:${AUTH_PORT:-3001}'
    env_file:
      - ./auth/.env
    environment:
      - PORT=${AUTH_PORT:-3001}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  # ── Learn Service ─────────────────────────────────
  learn:
    image: ${LEARN_IMAGE:-ghcr.io/vulinhnopro2704/english-learning-be/learn:latest}
    container_name: learn-service
    ports:
      - '${LEARN_PORT:-3002}:${LEARN_PORT:-3002}'
    env_file:
      - ./learn/.env
    environment:
      - PORT=${LEARN_PORT:-3002}
    restart: unless-stopped
    networks:
      - app-network

  # ── FSRS-AI Service ───────────────────────────────
  fsrs-ai:
    image: ${FSRS_IMAGE:-ghcr.io/vulinhnopro2704/english-learning-be/fsrs-ai:latest}
    container_name: fsrs-ai-service
    ports:
      - '${FSRS_PORT:-8000}:8000'
    env_file:
      - ./fsrs-ai/.env
    restart: unless-stopped
    networks:
      - app-network

  # ── Redis ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-changeme}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  redis-data:

networks:
  app-network:
    driver: bridge
