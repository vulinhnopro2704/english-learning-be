services:
  # ── API Gateway (Public Entry) ──────────────────
  api-gateway:
    image: ${GATEWAY_IMAGE:-ghcr.io/vulinhnopro2704/english-learning-be/gateway:latest}
    container_name: api-gateway
    ports:
      - '${API_GATEWAY_PORT:-3000}:${API_GATEWAY_PORT:-3000}'
    environment:
      - PORT=${API_GATEWAY_PORT:-3000}
      - AUTH_UPSTREAM_URL=${AUTH_UPSTREAM_URL:-http://auth:3001}
      - LEARN_UPSTREAM_URL=${LEARN_UPSTREAM_URL:-http://learn:3002}
      - STORAGE_UPSTREAM_URL=${STORAGE_UPSTREAM_URL:-http://storage:3003}
      - FSRS_AI_UPSTREAM_URL=${FSRS_AI_UPSTREAM_URL:-http://fsrs-ai:3003}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-100}
      - RATE_LIMIT_WINDOW_SEC=${RATE_LIMIT_WINDOW_SEC:-60}
      - TRUST_X_FORWARDED_FOR=${TRUST_X_FORWARDED_FOR:-true}
      - TRUST_PROXY=${TRUST_PROXY:-loopback}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - IP_BLACKLIST=${IP_BLACKLIST:-}
      - SWAGGER_ENABLED=${GATEWAY_SWAGGER_ENABLED:-true}
      - SWAGGER_PATH=${GATEWAY_SWAGGER_PATH:-api-docs}
      - SWAGGER_TITLE=${GATEWAY_SWAGGER_TITLE:-API Gateway}
    depends_on:
      redis:
        condition: service_healthy
      auth:
        condition: service_started
      learn:
        condition: service_started
      storage:
        condition: service_healthy
      fsrs-ai:
        condition: service_started
    restart: no
    networks:
      - app-network

  # ── Auth Service ──────────────────────────────────
  auth:
    image: ${AUTH_IMAGE:-ghcr.io/vulinhnopro2704/english-learning-be/auth:latest}
    container_name: auth-service
    expose:
      - '${AUTH_PORT:-3001}'
    env_file:
      - ./auth/.env
    environment:
      - PORT=${AUTH_PORT:-3001}
      - SWAGGER_ENABLED=${AUTH_SWAGGER_ENABLED:-true}
      - SWAGGER_PATH=${AUTH_SWAGGER_PATH:-api-docs}
      - SWAGGER_TITLE=${AUTH_SWAGGER_TITLE:-Auth API}
    depends_on:
      redis:
        condition: service_healthy
    restart: no
    networks:
      - app-network

  # ── Learn Service ─────────────────────────────────
  learn:
    image: ${LEARN_IMAGE:-ghcr.io/vulinhnopro2704/english-learning-be/learn:latest}
    container_name: learn-service
    expose:
      - '${LEARN_PORT:-3002}'
    env_file:
      - ./learn/.env
    environment:
      - PORT=${LEARN_PORT:-3002}
      - SWAGGER_ENABLED=${LEARN_SWAGGER_ENABLED:-true}
      - SWAGGER_PATH=${LEARN_SWAGGER_PATH:-api-docs}
      - SWAGGER_TITLE=${LEARN_SWAGGER_TITLE:-Learn API}
    restart: no
    networks:
      - app-network

  # ── Storage Service ───────────────────────────────
  storage:
    image: ${STORAGE_IMAGE:-ghcr.io/vulinhnopro2704/english-learning-be/storage:latest}
    container_name: storage-service
    expose:
      - '${STORAGE_PORT:-3003}'
    env_file:
      - ./storage/.env
    environment:
      - PORT=${STORAGE_PORT:-3003}
      - SWAGGER_ENABLED=${STORAGE_SWAGGER_ENABLED:-true}
      - SWAGGER_PATH=${STORAGE_SWAGGER_PATH:-api-docs}
      - SWAGGER_TITLE=${STORAGE_SWAGGER_TITLE:-Storage API}
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- "http://127.0.0.1:${STORAGE_PORT:-3003}/v1/health" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: no
    networks:
      - app-network

  # ── FSRS-AI Service ───────────────────────────────
  fsrs-ai:
    image: ${FSRS_AI_IMAGE:-ghcr.io/vulinhnopro2704/english-learning-be/fsrs-ai:latest}
    container_name: fsrs-ai-service
    expose:
      - '${FSRS_AI_PORT:-3003}'
    environment:
      - DATABASE_URL=${FSRS_AI_DATABASE_URL}
      - PORT=${FSRS_AI_PORT:-3003}
      - ROOT_PATH=/fsrs-ai
    restart: no
    networks:
      - app-network

  # ── Redis ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:-changeme}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    restart: no
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-changeme}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  redis-data:

networks:
  app-network:
    driver: bridge
